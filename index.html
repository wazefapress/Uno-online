<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة UNO المتعددة أونلاين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
    <!-- استدعاء مكتبة Socket.io Client -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        /* احتفظ بنفس تنسيقاتك الأصلية هنا، سأضيف فقط تنسيقات الدردشة والغرفة */
        :root { --p-color: #2ec4b6; --bg-dark: #0f172a; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { margin: 0; background: radial-gradient(circle, #1e293b 0%, var(--bg-dark) 100%); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* ... ضع جميع التنسيقات الأصلية للبطاقات والطاولة هنا ... */

        /* تصميم صندوق المحادثة */
        #chat-container {
            position: fixed; bottom: 20px; right: 20px; width: 300px;
            background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px; display: none; flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 100;
        }
        #chat-messages { height: 200px; overflow-y: auto; padding: 10px; font-size: 0.9rem; }
        #chat-input-area { display: flex; border-top: 1px solid rgba(255,255,255,0.1); }
        #chat-input { flex-grow: 1; padding: 10px; background: transparent; border: none; color: white; outline: none; }
        #chat-btn { padding: 10px; background: var(--p-color); border: none; color: white; cursor: pointer; border-radius: 0 0 0 15px; font-weight: bold; }
        
        /* واجهة الغرف */
        .room-actions { display: flex; gap: 10px; margin-top: 15px; flex-direction: column; }
        .room-actions input { padding: 10px; border-radius: 8px; border: none; text-align: center; font-family: 'Cairo'; }
    </style>
</head>
<body>

    <div id="toast">رسالة تنبيه</div>

    <!-- شاشة اللوبي (الغرف) -->
    <div id="start-screen" class="overlay">
        <h1>UNO Online 🌍</h1>
        <div class="setup-container" style="text-align: center;">
            <input type="text" id="player-name" placeholder="أدخل اسمك هنا..." style="padding:10px; width:80%; margin-bottom:15px; border-radius:8px;">
            <div class="room-actions">
                <button class="btn" onclick="createRoom()">إنشاء غرفة جديدة 🏠</button>
                <hr style="width: 100%; border-color: rgba(255,255,255,0.1);">
                <input type="text" id="room-code-input" placeholder="كود الغرفة للانضمام">
                <button class="btn" onclick="joinRoom()" style="background: #0072ff;">انضمام للغرفة 🤝</button>
            </div>
            <div id="lobby-players" style="margin-top: 20px; font-weight: bold; color: #38ef7e;"></div>
            <button id="start-game-btn" class="btn" onclick="requestStartGame()" style="display:none; margin-top:15px; width:100%;">بدء اللعبة 🚀</button>
        </div>
    </div>

    <!-- شاشة نهاية اللعبة (محدثة لدعم إعادة اللعب في نفس الغرفة) -->
    <div id="gameover-screen" class="overlay" style="display: none;">
        <h1 id="winner-message">تهانينا!</h1>
        <button class="btn" onclick="requestStartGame()">إعادة اللعب في نفس الغرفة 🔄</button>
    </div>

    <!-- صندوق الدردشة -->
    <div id="chat-container">
        <div style="background: var(--p-color); padding: 5px 10px; border-radius: 15px 15px 0 0; font-weight:bold;">الدردشة 💬 <span id="room-id-display" style="font-size:0.8rem; float:left;"></span></div>
        <div id="chat-messages"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="اكتب رسالة...">
            <button id="chat-btn" onclick="sendChatMessage()">إرسال</button>
        </div>
    </div>

    <!-- احتفظ بشبكة اللعب #game-container وعناصرها كما هي في كودك الأصلي -->

    <script>
        // الاتصال بالخادم (استبدل localhost برابط الخادم عند الرفع)
        
        // في بداية السكريبت
const socket = io('https://uno-online-1.onrender.com', {
    transports: ['websocket'], // فرض استخدام الويب سوكت
    secure: true
});

socket.on('connect', () => {
    console.log('تم الاتصال بالسيرفر بنجاح:', socket.id);
});

socket.on('connect_error', (err) => {
    console.error('فشل الاتصال بالسيرفر:', err);
    alert('فشل الاتصال بالسيرفر، تأكد من رابط السيرفر!');
});

        let myPlayerId = '';
const io = new Server(server, { 
    cors: { 
        origin: "https://uno-online.haythamzeidan.workers.dev/", // استبدله برابط Cloudflare الخاص بك
        methods: ["GET", "POST"] 
    } 
});
        // أحداث اللوبي والغرف
        function createRoom() {
    const name = document.getElementById('player-name').value;
    if (!name) { alert("يرجى إدخال الاسم"); return; }
    
    console.log("جاري محاولة إنشاء غرفة...");
    socket.emit('createRoom', name); // هذا يرسل الطلب للسيرفر
}

// التأكد من استقبال الحدث وعرض الكود
socket.on('roomCreated', (code) => {
    console.log("تم استلام كود الغرفة:", code);
    alert("تم إنشاء الغرفة! كود الغرفة هو: " + code);
    
    // تحديث الواجهة
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('room-id-display').innerText = code;
    document.getElementById('chat-container').style.display = 'flex';
});

        function joinRoom() {
            const name = document.getElementById('player-name').value || 'لاعب';
            const code = document.getElementById('room-code-input').value;
            socket.emit('joinRoom', { roomCode: code, playerName: name });
            myRoomCode = code;
        }

        socket.on('roomCreated', (code) => {
            myRoomCode = code;
            myPlayerId = socket.id;
            document.getElementById('room-id-display').innerText = `الكود: ${code}`;
            alert(`تم إنشاء الغرفة! شارك هذا الكود مع أصدقائك: ${code}`);
            document.getElementById('start-game-btn').style.display = 'block';
        });

        socket.on('updateLobby', (players) => {
            const lobbyDiv = document.getElementById('lobby-players');
            lobbyDiv.innerHTML = `اللاعبون المتصلون (${players.length}/4):<br>` + players.map(p => p.name).join(' - ');
        });

        // أحداث اللعب
        function requestStartGame() {
            socket.emit('startGame', myRoomCode);
        }

        socket.on('gameStateUpdate', (serverState) => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('gameover-screen').style.display = 'none';
            document.getElementById('chat-container').style.display = 'flex';
            
            // تحديث الواجهة بناءً على حالة الخادم
            // ملاحظة: ستحتاج لتعديل دالة updateUI() الأصلية لتقرأ من serverState بدلاً من gameState المحلي
            renderGame(serverState);
        });

        socket.on('gameOver', (winnerName) => {
            document.getElementById('winner-message').innerText = `🎉 فاز اللاعب ${winnerName} باللعبة! 🎉`;
            document.getElementById('gameover-screen').style.display = 'flex';
        });

        // نظام الدردشة
        function sendChatMessage() {
            const msg = document.getElementById('chat-input').value;
            if(msg.trim() === '') return;
            const name = document.getElementById('player-name').value || 'لاعب';
            socket.emit('sendMessage', { roomCode: myRoomCode, message: msg, playerName: name });
            document.getElementById('chat-input').value = '';
        }

        socket.on('chatMessage', (data) => {
            const chatBox = document.getElementById('chat-messages');
            chatBox.innerHTML += `<div style="margin-bottom:5px;"><strong>${data.sender}:</strong> ${data.text}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        // الدالة المعدلة لعرض البطاقات والطاولة بناءً على التزامن
        function renderGame(state) {
            // هنا تقوم ببرمجة عرض الكروت بحيث يرى اللاعب أوراقه فقط بناءً على (socket.id)
            // ويتم تعيين ظهر البطاقة (back) لبقية اللاعبين.
            // وعندما ينقر اللاعب على بطاقة، يقوم بإرسال الحدث:
            // socket.emit('playCard', { roomCode: myRoomCode, cardIndex: idx });
        }
    </script>
</body>
</html>
